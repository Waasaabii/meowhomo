<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      .stroke-bold { fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-thin { fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .bg-fill { fill: var(--bg-color, #ffffff); }
      .accent-fill { fill: currentColor; }

      /* 极速奔跑时的身体和头部颠簸 */
      @keyframes dashBump {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(2px); }
      }
      /* 迎风飞舞的运动发带 (Headband tails) */
      @keyframes headbandFlutter {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(15deg); }
      }
      /* 耳朵被强风往后压平 */
      @keyframes earWind {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-5deg); }
      }

      .anim-body { transform-origin: 24px 34px; animation: dashBump 0.3s ease-in-out infinite; }
      .anim-band { transform-origin: 36px 16px; animation: headbandFlutter 0.2s linear infinite; }
      .anim-ear-l { transform-origin: 16px 14px; animation: earWind 0.3s ease-in-out infinite; }
      .anim-ear-r { transform-origin: 32px 14px; animation: earWind 0.3s ease-in-out infinite 0.15s; }
      
      /* 奔跑时身后的速度线残影 */
      @keyframes speedLine {
        0% { transform: translateX(5px); opacity: 0; }
        50% { transform: translateX(-5px); opacity: 1; }
        100% { transform: translateX(-15px); opacity: 0; }
      }
      .anim-line-1 { animation: speedLine 0.4s linear infinite; }
      .anim-line-2 { animation: speedLine 0.4s linear infinite 0.2s; }
      .anim-line-3 { animation: speedLine 0.4s linear infinite 0.1s; }
    </style>
  </defs>

  <!-- 极速奔跑背后的漫画速度风场线 (Speed lines) -->
  <g class="stroke-thin" stroke-opacity="0.5">
    <line x1="48" y1="12" x2="38" y2="12" class="anim-line-1" />
    <line x1="46" y1="28" x2="36" y2="28" class="anim-line-2" />
    <line x1="48" y1="42" x2="42" y2="42" class="anim-line-3" />
  </g>

  <g class="anim-body">
    <!-- 身体前倾冲刺 (Dashing forward posture) -->
    <path class="stroke-bold bg-fill" d="M 8 48 C 16 38, 32 38, 20 48" />
    
    <!-- 双手像忍者跑一样往后甩 (Ninja run shape) -->
    <ellipse cx="36" cy="40" rx="3" ry="5" class="stroke-bold bg-fill" transform="rotate(60 36 40)" />
    <ellipse cx="42" cy="44" rx="3" ry="5" class="stroke-bold bg-fill" transform="rotate(80 42 44)" />

    <!-- 飘到后方的拉长版头巾尾巴 -->
    <g class="anim-band">
      <path class="stroke-bold bg-fill" d="M 38 18 C 42 20, 48 24, 46 22 C 44 20, 40 18, 38 18 Z" />
      <path class="stroke-bold bg-fill" d="M 38 18 C 44 22, 46 28, 44 26 C 42 24, 38 20, 38 18 Z" />
    </g>

    <!-- 头部主容器 (为了迎合速度感微微向右倾斜下压) -->
    <g transform="rotate(-10 24 24)">
      <!-- 圆润的包子脸框 -->
      <path class="stroke-bold bg-fill" d="M 24 36 C 38 36, 40 24, 40 18 C 40 10, 34 6, 24 6 C 14 6, 8 10, 8 18 C 8 24, 10 36, 24 36 Z" />

      <!-- 被强风压平的折耳外壳 -->
      <g class="anim-ear-l">
        <path class="stroke-bold bg-fill" d="M 16 14 L 4 10 L 12 6" />
      </g>
      <g class="anim-ear-r">
        <path class="stroke-bold bg-fill" d="M 32 14 L 44 10 L 36 6" />
      </g>

      <!-- 运动装的粗条纹吸汗头带 (Sweatband) -->
      <path class="stroke-thin bg-fill" d="M 8 18 C 14 16, 34 16, 40 18 C 34 14, 14 14, 8 18 Z" />
      
      <!-- 燃烧的斗志眼神 (Burning strict eyes) -->
      <g class="stroke-bold">
        <path d="M 12 24 L 20 22 C 18 24, 16 26, 12 24" class="bg-fill" />
        <path d="M 36 24 L 28 22 C 30 24, 32 26, 36 24" class="bg-fill" />
        <circle cx="16" cy="24" r="1.5" class="fill-main" />
        <circle cx="32" cy="24" r="1.5" class="fill-main" />
      </g>
      
      <!-- 猫嘴咬牙冲刺 (-w-) -->
      <path class="stroke-thin" d="M 20 30 C 22 28, 22 30, 24 28 C 26 30, 26 28, 28 30" />
      
      <!-- 极速产生的脸颊汗珠向后飞 -->
      <path class="stroke-thin" d="M 10 28 L 6 26" />
      <path class="stroke-thin" d="M 38 28 L 42 26" />
    </g>
  </g>
</svg>
