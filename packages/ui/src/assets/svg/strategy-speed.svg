<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <style>
      .stroke-main { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      
      /* 火箭冲刺动效：极速飞行时的微小抖动与尾焰快速喷射 */
      @keyframes rocketShake {
        0%, 100% { transform: translateY(0) translateX(0); }
        25% { transform: translateY(-1px) translateX(1px); }
        75% { transform: translateY(0.5px) translateX(-0.5px); }
      }
      
      @keyframes flameJet {
        0% { stroke-dasharray: 4 4; stroke-dashoffset: 0; }
        100% { stroke-dasharray: 4 4; stroke-dashoffset: -8; }
      }

      .anim-rocket { animation: rocketShake 0.1s linear infinite; }
      .anim-flame { animation: flameJet 0.2s linear infinite; }
    </style>
  </defs>

  <g class="anim-rocket">
    <!-- 将火箭的两个尾翼设计成像猫耳一样的形状 -->
    <path class="stroke-main" d="M 6 18 A 8 8 0 0 1 18 6 C 18 6, 21 3, 21 3 C 21 3, 18 3, 11 10 C 6 15, 6 18, 6 18 Z" />
    <path class="stroke-main" d="M 17 6 L 20 9" />
    
    <!-- 猫耳形态机翼 (Left/Right Wing) -->
    <path class="stroke-main" d="M 9 15 L 4 15 L 6 12" />
    <path class="stroke-main" d="M 15 9 L 15 4 L 12 6" />

    <!-- 舷窗处的迷你猫爪印/圆点 -->
    <circle cx="14" cy="10" r="1.5" stroke="currentColor" stroke-width="2" fill="none" />
  </g>

  <!-- 火箭尾焰以两道虚线喷射出高速前进感 -->
  <path class="stroke-main anim-flame" d="M 5 5 L 2 2" stroke-width="1.5" />
  <path class="stroke-main anim-flame" d="M 8 2 L 6 0" stroke-width="1.5" />

</svg>
