<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      .stroke-bold { fill: none; stroke: currentColor; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-thin { fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .bg-fill { fill: var(--bg-color, #ffffff); }
      .accent-fill { fill: currentColor; }
      
      /* 被毛线团死死缠住无法挣脱的左右滚来滚去 */
      @keyframes struggleRoll {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(5deg) translateY(-2px); }
      }
      /* 缠在身上的毛线线条的越勒越紧/呼吸起伏 */
      @keyframes yarnTighten {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(0.98); }
      }
      /* 绝望地掉眼泪 */
      @keyframes cryTears {
        0% { transform: translateY(0); opacity: 0; }
        20% { transform: translateY(5px); opacity: 1; }
        80% { transform: translateY(20px); opacity: 1; }
        100% { transform: translateY(25px); opacity: 0; }
      }

      .anim-body { transform-origin: 128px 128px; animation: struggleRoll 1.5s ease-in-out infinite; }
      .anim-yarn { transform-origin: 128px 150px; animation: yarnTighten 2s ease-in-out infinite; }
      .anim-tear-l { animation: cryTears 2s cubic-bezier(0.4, 0, 1, 1) infinite; }
      .anim-tear-r { animation: cryTears 2s cubic-bezier(0.4, 0, 1, 1) infinite 0.5s; }
    </style>
  </defs>

  <!-- 整个身体被包成了一个巨大的毛线粽子 (Tangled in a yarn ball) -->
  <g class="anim-body">
    <!-- 从毛线球里伸出来的可怜后脚/尾巴 -->
    <ellipse cx="60" cy="180" rx="10" ry="20" class="stroke-bold bg-fill" transform="rotate(-40 60 180)" />
    <path class="stroke-bold bg-fill" d="M 180 200 C 230 220, 240 180, 200 160" />

    <!-- 巨大的中心毛线团包住了身体 -->
    <g class="anim-yarn">
      <circle cx="128" cy="150" r="70" class="stroke-bold bg-fill" />
      <!-- 缠绕的杂乱毛线线条 (Chaotic yarn strings) -->
      <path class="stroke-bold" d="M 68 110 C 140 180, 180 180, 194 130" opacity="0.6" />
      <path class="stroke-bold" d="M 80 170 C 120 100, 180 120, 175 190" opacity="0.6" />
      <path class="stroke-bold" d="M 58 150 C 90 150, 160 140, 184 170" opacity="0.6" />
      <path class="stroke-bold" d="M 100 80 C 100 140, 140 220, 160 190" opacity="0.6" />
      
      <!-- 从毛线里拼命伸出来的可怜双手 (Reaching out for help) -->
      <path class="stroke-bold bg-fill" d="M 80 100 C 60 70, 70 50, 90 60" />
      <path class="stroke-bold bg-fill" d="M 176 100 C 196 70, 186 50, 166 60" />
    </g>

    <g transform="translate(0, -30)">
      <!-- 被勒得通红的委屈包子脸 (Squished sad face) -->
      <path class="stroke-bold bg-fill" d="M 128 150 C 70 150, 60 110, 60 80 C 60 50, 90 30, 128 30 C 166 30, 196 50, 196 80 C 196 110, 186 150, 128 150 Z" />
      
      <!-- 无力耷拉的耳朵 -->
      <path class="stroke-bold bg-fill" d="M 72 44 L 40 50 L 60 70" />
      <path class="stroke-bold bg-fill" d="M 184 44 L 216 50 L 196 70" />

      <!-- 委屈大哭的宽面条泪眼 (Crying Q <> Q) -->
      <g class="stroke-bold">
        <path d="M 80 80 L 100 70 L 110 80" />
        <path d="M 176 80 L 156 70 L 146 80" />
      </g>
      
      <!-- 哇哇大哭的波浪嘴 -->
      <path class="stroke-bold" d="M 116 110 Q 128 90 140 110 Q 128 130 116 110 Z" />
      <!-- 小舌头 -->
      <path class="stroke-thin" d="M 124 116 Q 128 112 132 116" />
      
      <!-- 下落的眼泪 -->
      <g class="anim-tear-l">
        <path class="stroke-bold fill-main" d="M 90 90 C 100 100, 100 110, 90 110 C 80 110, 80 100, 90 90 Z" />
      </g>
      <g class="anim-tear-r">
        <path class="stroke-bold fill-main" d="M 166 90 C 176 100, 176 110, 166 110 C 156 110, 156 100, 166 90 Z" />
      </g>
      
      <!-- 缠在额头上的一根绷紧的毛线 (Struggling mark) -->
      <path class="stroke-bold" d="M 50 70 C 128 50, 160 50, 206 70" opacity="0.8" />
    </g>
  </g>
</svg>
