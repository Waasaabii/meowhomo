<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <style>
      .stroke-main { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .fill-main { fill: currentColor; }

      /* 刷新按钮循环转盘（Refresh circle spin） */
      @keyframes refreshSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* 猫爪连续快速拨弄的动作 */
      @keyframes pawSwipe {
        0%, 100% { transform: translateY(0) rotate(0); }
        50% { transform: translateY(-3px) rotate(-15deg); }
      }

      .anim-spin { transform-origin: 10px 10px; animation: refreshSpin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite; }
      .anim-paw { transform-origin: 18px 18px; animation: pawSwipe 1.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- 左上方的主体：循环刷新的转盘箭头 (Refresh Array) -->
  <g class="anim-spin">
    <!-- 循环箭头 1 -->
    <path class="stroke-main" d="M 6 10 C 6 7.8 7.8 6 10 6 C 11.5 6 12.8 6.8 13.5 8" />
    <path class="stroke-main" d="M 14 5 L 14 8 L 11 8" stroke-linejoin="miter" />
    
    <!-- 循环箭头 2 -->
    <path class="stroke-main" d="M 14 10 C 14 12.2 12.2 14 10 14 C 8.5 14 7.2 13.2 6.5 12" />
    <path class="stroke-main" d="M 6 15 L 6 12 L 9 12" stroke-linejoin="miter" />
  </g>

  <!-- 右下方：猫爪伸过来如同在拨转轮盘一样 (Swiping down) -->
  <g class="anim-paw">
    <path class="fill-main" d="M 17 14 C 15 14 15 16 16 18 C 15 20 17 21 19 21 C 21 21 23 20 22 18 C 23 16 23 14 21 14 Z" />
    <!-- 手指垫侧边拨动感 -->
    <circle cx="15.5" cy="12.5" r="1.5" class="fill-main" />
    <circle cx="18.5" cy="11.5" r="1.5" class="fill-main" />
  </g>

</svg>
