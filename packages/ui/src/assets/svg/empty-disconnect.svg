<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      .stroke-bold { fill: none; stroke: currentColor; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-thin { fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .bg-fill { fill: var(--bg-color, #ffffff); }
      .accent-fill { fill: currentColor; }
      
      /* 心虚/做贼心虚的左右看 (Guilty looking around) */
      @keyframes guiltyLook {
        0%, 100% { transform: translateX(0); }
        30% { transform: translateX(-4px); }
        70% { transform: translateX(4px); }
      }
      /* 嘴里还咬着网线，一扯一扯的 (Chewing the wire) */
      @keyframes chewWire {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-5deg) translateX(-2px); }
      }
      /* 漏电的电火花闪烁 (Sparks) */
      @keyframes sparkFlash {
        0%, 50%, 100% { opacity: 0; transform: scale(0.5); }
        10%, 60% { opacity: 1; transform: scale(1.2); }
        20%, 70% { opacity: 0; transform: scale(0.8); }
      }

      .anim-eyes { animation: guiltyLook 3s ease-in-out infinite; }
      .anim-head { transform-origin: 128px 200px; animation: chewWire 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) infinite; }
      .anim-spark-1 { transform-origin: 200px 180px; animation: sparkFlash 2s step-end infinite; }
      .anim-spark-2 { transform-origin: 50px 180px; animation: sparkFlash 2.5s step-end infinite; }
    </style>
  </defs>

  <!-- 地上被残忍咬成两截的主干网线/光缆 (Chewed Ethernet Cable cross the floor) -->
  <!-- 左边那截带着漏电火花 -->
  <path class="stroke-bold" d="M 0 200 C 30 220, 50 180, 70 190" />
  <path class="stroke-bold" d="M 68 185 L 75 190 L 68 195" /> <!-- 断掉的铜丝 -->
  <g class="anim-spark-1">
    <path class="stroke-bold" d="M 75 185 L 85 175 M 85 195 L 95 185" stroke-dasharray="2 6" />
  </g>

  <!-- 右边那截连着墙上或者外面 -->
  <path class="stroke-bold" d="M 256 210 C 220 190, 200 230, 180 200" />
  <path class="stroke-bold" d="M 183 195 L 175 200 L 183 205" /> <!-- 断掉的铜丝 -->
  <g class="anim-spark-2">
    <path class="stroke-bold" d="M 175 195 L 165 185 M 165 205 L 155 195" stroke-dasharray="2 6" />
  </g>

  <!-- 惹祸的猫本尊，吓得缩成一团装无辜 -->
  <g class="anim-head">
    <!-- 身体像个圆滚滚的毛球缩着躲避视线 -->
    <path class="stroke-bold bg-fill" d="M 60 220 C 60 130, 196 130, 196 220 Z" />
    
    <!-- 背在身后心虚搓着的小手 (Guilty hands behind back) -->
    <path class="stroke-bold bg-fill" d="M 100 210 C 100 180, 140 180, 140 210" />
    <path class="stroke-bold bg-fill" d="M 156 210 C 156 180, 116 180, 116 210" />

    <!-- 竖得直直的甚至有些炸毛的耳朵 (Startled ears) -->
    <path class="stroke-bold bg-fill" d="M 90 90 L 70 30 L 120 70" />
    <path class="stroke-bold bg-fill" d="M 166 90 L 186 30 L 136 70" />
    <!-- 耳朵边上的炸毛细节 -->
    <path class="stroke-thin" d="M 70 40 L 60 50 M 186 40 L 196 50" />

    <!-- 瞪得浑圆且心虚无比的大眼睛 (OvO face) -->
    <rect x="70" y="100" width="116" height="80" rx="36" class="stroke-bold bg-fill" /> <!-- 脸框下沉一点融入身体 -->
    
    <g class="anim-eyes">
      <!-- 极度惊恐放大的瞳仁 -->
      <circle cx="106" cy="130" r="12" class="fill-main" />
      <circle cx="150" cy="130" r="12" class="fill-main" />
      <circle cx="110" cy="126" r="3" class="bg-fill stroke-main" /> <!-- 眼神光 -->
      <circle cx="154" cy="126" r="3" class="bg-fill stroke-main" />
    </g>

    <!-- 嘴巴里甚至还掉出了一小节被咬烂的电线皮 (Guilty wire piece) -->
    <path class="stroke-bold" d="M 124 160 Q 128 150 132 160" /> <!-- `~` 撇缩的嘴 -->
    <path class="stroke-bold" d="M 128 156 C 128 170, 140 180, 140 190" /> <!-- 嘴里吐出的线头 -->
    <circle cx="140" cy="190" r="2" class="fill-main" />
  </g>

  <!-- 头顶上的三个巨大的惊叹号点 (Alert/Nervous drops) -->
  <g class="stroke-bold" stroke-linecap="round">
    <path d="M 60 80 L 50 60" /> <circle cx="48" cy="50" r="2" class="fill-main" />
    <path d="M 128 50 L 128 20" /> <circle cx="128" cy="10" r="2" class="fill-main" />
    <path d="M 196 80 L 206 60" /> <circle cx="208" cy="50" r="2" class="fill-main" />
  </g>
</svg>
