<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <style>
      .stroke-main { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .fill-main { fill: currentColor; }
      
      /* 文件被复制出来时的弹跳层 */
      @keyframes copyPop {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(2px, -2px); }
      }
      
      /* 猫爪用力一按 (Stamp down) */
      @keyframes pawStamp {
        0%, 100% { transform: translateY(0) scaleX(1); }
        50% { transform: translateY(2px) scaleX(1.05); }
      }

      .anim-doc { animation: copyPop 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) infinite; }
      .anim-paw { transform-origin: 16px 16px; animation: pawStamp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) infinite; }
    </style>
  </defs>

  <!-- 背后的原文件底页 -->
  <path class="stroke-main" d="M 5 15 L 5 5 C 5 4 6 3 7 3 L 13 3 L 17 7 L 17 11" />
  <path class="stroke-main" d="M 13 3 L 13 7 L 17 7" />

  <!-- 前方被复制出来的副本页 (带弹跳动效) -->
  <g class="anim-doc">
    <path class="stroke-main" d="M 8 19 L 8 9 C 8 8 9 7 10 7 L 16 7 L 20 11 L 20 19 C 20 20 19 21 18 21 L 10 21 C 9 21 8 20 8 19 Z" fill="var(--bg-color, #ffffff)" />
    <!-- 副本页面的折角 -->
    <path class="stroke-main" d="M 16 7 L 16 11 L 20 11" />
    
    <!-- 猫爪印在刚刚复制出来的文件上 (Cat Stamp) -->
    <g class="anim-paw">
      <path class="fill-main" d="M 14 16 C 12 16 12 14 13 12 C 12 10 14 9 16 9 C 18 9 20 10 19 12 C 20 14 20 16 18 16 Z" />
      <circle cx="12.5" cy="11" r="1" class="fill-main" />
      <circle cx="14" cy="9" r="1.5" class="fill-main" />
      <circle cx="17.5" cy="9" r="1" class="fill-main" />
    </g>
  </g>

</svg>
