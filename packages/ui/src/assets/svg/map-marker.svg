<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" class="nav-icon">
  <defs>
    <style>
      .stroke-main { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .fill-main { fill: currentColor; }
      
      /* 从天而降定点盖章的弹跳 (Marker landing jump) */
      @keyframes markerBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      /* 下方的阴影配合收缩 */
      @keyframes shadowShrink {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(0.6); opacity: 0.1; }
      }
      .nav-icon:hover .anim-marker { animation: markerBounce 0.6s cubic-bezier(0.1, 0.9, 0.2, 1) infinite; }
      .nav-icon:hover .anim-shadow { transform-origin: 12px 21px; animation: shadowShrink 0.6s cubic-bezier(0.1, 0.9, 0.2, 1) infinite; }
    </style>
  </defs>

  <!-- 地标底部的阴影反馈 -->
  <ellipse cx="12" cy="21" rx="4" ry="1.5" class="fill-main anim-shadow" opacity="0.3" />

  <g class="anim-marker">
    <!-- 地图气泡轮廓形状 (Iconic Pin outline) -->
    <path class="stroke-main" fill="var(--bg-color, #ffffff)" d="M 12 21 C 12 21 5 13 5 8 C 5 4 8 1 12 1 C 16 1 19 4 19 8 C 19 13 12 21 12 21 Z" />
    
    <!-- 中心深深刻下的一枚猫爪脚印 (Paw Print Core) -->
    <path class="fill-main" d="M 12 13 C 10 13 9 11 10 9 C 11 8 13 8 14 9 C 15 11 14 13 12 13 Z" />
    <circle cx="9" cy="8" r="1.5" class="fill-main" />
    <circle cx="12" cy="7" r="1.5" class="fill-main" />
    <circle cx="15" cy="8" r="1.5" class="fill-main" />
  </g>
</svg>
