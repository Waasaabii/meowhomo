<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" class="nav-icon">
  <defs>
    <style>
      .stroke-main { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .fill-main { fill: currentColor; }
      
      /* 猫爪拨动开关的侧推力反馈 */
      @keyframes pawSlide {
        0%, 100% { transform: translateX(0) scaleY(1); }
        50% { transform: translateX(4px) scaleY(0.9); }
      }
      
      /* 开关滑块随着猫爪同频滑动 */
      @keyframes switchKnob {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(4px); }
      }

      .nav-icon:hover .anim-paw { transform-origin: 6px 16px; animation: pawSlide 0.4s ease-in-out; }
      .nav-icon:hover .anim-knob { animation: switchKnob 0.4s ease-in-out; }
      .nav-icon[data-active="true"] .anim-paw { transform: translateX(4px); }
      .nav-icon[data-active="true"] .anim-knob { transform: translateX(4px); }
    </style>
  </defs>

  <!-- 经典的 Toggle 开关底座 (Switch track) -->
  <rect x="4" y="6" width="16" height="8" rx="4" class="stroke-main" />

  <!-- 开关滑块圆点 (Switch Knob) -->
  <circle cx="8" cy="10" r="2" class="fill-main anim-knob" />

  <!-- 下方：主观视角的猫爪伸上来随时准备拨弄开关 -->
  <g class="anim-paw">
    <path class="fill-main" d="M 6 16 C 5 16 4 18 5 20 C 4 22 6 22 8 22 C 10 22 11 20 10 18 C 11 16 10 16 8 16 Z" />
    <circle cx="5" cy="14" r="1.5" class="fill-main" />
    <circle cx="8" cy="13.5" r="1.5" class="fill-main" />
    <circle cx="11" cy="14" r="1.5" class="fill-main" />
  </g>

</svg>
