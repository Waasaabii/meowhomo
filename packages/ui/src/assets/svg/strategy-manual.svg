<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <style>
      .stroke-main { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .fill-main { fill: currentColor; }
      
      /* 手动点击动效：模拟鼠标/手指点下去产生波纹反馈 */
      @keyframes clickRipple {
        0% { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(3); opacity: 0; }
      }
      
      @keyframes pointerTap {
        0%, 100% { transform: scale(1) translateY(0); }
        50% { transform: scale(0.9) translateY(2px); }
      }

      .anim-ripple {
        transform-origin: 12px 12px;
        animation: clickRipple 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
      .anim-pointer {
        transform-origin: 12px 12px;
        animation: pointerTap 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
    </style>
  </defs>

  <!-- 扩散的点击波纹 (Ripple effect) -->
  <circle cx="12" cy="12" r="4" class="stroke-main anim-ripple" opacity="0.5" stroke-width="1.5"/>

  <g class="anim-pointer">
    <!-- 指示点击的目标锚点/网格 -->
    <path class="stroke-main" d="M 12 7 L 12 10" />
    <path class="stroke-main" d="M 12 14 L 12 17" />
    <path class="stroke-main" d="M 7 12 L 10 12" />
    <path class="stroke-main" d="M 14 12 L 17 12" />
    
    <!-- 抽象化的猫抓指针 (Cat Paw Cursor) -->
    <!-- 代替了传统的鼠标箭头，改用一个小肉垫点击中心点 -->
    <path class="fill-main" d="M 12 13 C 14 13 16 15 15 17 C 14 19 10 19 9 17 C 8 15 10 13 12 13 Z" />
    <circle cx="9.5" cy="11.5" r="1.5" class="fill-main" />
    <circle cx="12" cy="10.5" r="1.5" class="fill-main" />
    <circle cx="14.5" cy="11.5" r="1.5" class="fill-main" />
  </g>

</svg>
