<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      .stroke-bold { fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-thin { fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .bg-fill { fill: var(--bg-color, #ffffff); }
      .accent-fill { fill: currentColor; }

      /* 搬箱子往前走导致身体一上一下的沉重步伐动效 */
      @keyframes heavyWalk {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(2px); }
      }
      /* 箱子由于太重/太大而在手里微微晃动 */
      @keyframes boxWobble {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-2deg); }
        75% { transform: rotate(3deg); }
      }

      .anim-head { transform-origin: 24px 34px; animation: heavyWalk 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .anim-box { transform-origin: 24px 44px; animation: boxWobble 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- 身体与双手 (正在托着巨大的纸箱子 Backup Box) -->
  <path class="stroke-bold bg-fill" d="M 12 48 C 12 40, 36 40, 36 48" />
  
  <g class="anim-box">
    <!-- 备份文件的纸皮打包箱 -->
    <rect x="14" y="32" width="20" height="16" rx="2" class="stroke-bold bg-fill" />
    <path class="stroke-thin" d="M 14 36 L 24 38 L 34 36" />
    <path class="stroke-thin" d="M 24 32 L 24 48" />
    <!-- 纸箱正面的回收/备份标志 (Recycle arrows) -->
    <g transform="translate(24, 42) scale(0.6)">
      <path class="stroke-thin" d="M -4 -4 L 4 -4 L 0 4 Z" />
      <path class="stroke-thin" d="M -2 0 C -6 4, 6 4, 2 0" stroke-dasharray="2 1" />
    </g>

    <!-- 托举箱子底部的两只小猫爪 -->
    <ellipse cx="14" cy="46" rx="4" ry="3" class="stroke-bold bg-fill" transform="rotate(-15 14 46)" />
    <ellipse cx="34" cy="46" rx="4" ry="3" class="stroke-bold bg-fill" transform="rotate(15 34 46)" />
  </g>

  <!-- 头部主容器 -->
  <g class="anim-head">
    <!-- 包子脸框 -->
    <path class="stroke-bold bg-fill" d="M 24 36 C 38 36, 40 24, 40 16 C 40 8, 34 6, 24 6 C 14 6, 8 8, 8 16 C 8 24, 10 36, 24 36 Z" />

    <!-- 耷拉的低垂猫耳（表示疲倦/干苦力） -->
    <path class="stroke-bold bg-fill" d="M 8 18 C 4 16, 2 24, 10 26" />
    <path class="stroke-bold bg-fill" d="M 40 18 C 44 16, 46 24, 38 26" />

    <!-- 头顶扎着勤劳的头巾/三角巾 (Bandana for chores) -->
    <path class="stroke-bold bg-fill" d="M 14 10 C 24 4, 34 10, 40 18 C 34 12, 14 12, 8 18 C 10 14, 12 12, 14 10 Z" />
    <!-- 头巾后脑勺打的结 -->
    <path class="stroke-bold bg-fill" d="M 11 8 C 8 4, 14 4, 15 8 Z" />

    <!-- 搬运重物导致憋气/辛苦闭眼的表情 (> <) -->
    <g class="stroke-bold">
      <path d="M 12 26 C 14 24, 18 24, 20 26" />
      <path d="M 36 26 C 34 24, 30 24, 28 26" />
    </g>
    
    <!-- 咬紧牙关的猫嘴 (~-~) -->
    <path class="stroke-thin" d="M 20 30 Q 22 28 24 30 Q 26 28 28 30" />
    <path class="stroke-thin" d="M 22 30 C 23 32, 25 32, 26 30" />
    
    <!-- 脸颊汗滴/劳累红晕 -->
    <line x1="12" y1="29" x2="16" y2="29" class="stroke-thin" stroke-opacity="0.5" />
    <line x1="32" y1="29" x2="36" y2="29" class="stroke-thin" stroke-opacity="0.5" />
  </g>
</svg>
