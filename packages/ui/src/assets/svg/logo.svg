<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" class="meow-logo">
  <defs>
    <style>
      /* 核心结构线与底板背景 */
      .stroke-bold { fill: none; stroke: currentColor; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .bg-fill { fill: var(--logo-bg-color, transparent); }
      
      /* 肉球颜色分离：使用 CSS 变量，若未提供则 fallback 到 currentColor */
      .paw-pad-main { fill: var(--logo-pad-color, currentColor); }
      .paw-toe-1 { fill: var(--logo-toe1-color, var(--logo-pad-color, currentColor)); }
      .paw-toe-2 { fill: var(--logo-toe2-color, var(--logo-pad-color, currentColor)); }
      .paw-toe-3 { fill: var(--logo-toe3-color, var(--logo-pad-color, currentColor)); }
      .paw-toe-4 { fill: var(--logo-toe4-color, var(--logo-pad-color, currentColor)); }

      /* 猫爪按压软糖跳动效 */
      @keyframes pawPress {
        0%, 10%, 100% { transform: scale(1) translateY(0); }
        5% { transform: scale(0.95, 1.05) translateY(-2px); }
        7% { transform: scale(1.1, 0.8) translateY(6px); }
        9% { transform: scale(0.9, 1.1) translateY(-4px); }
      }

      /* 肉垫小幅度呼吸呼吸 */
      @keyframes padBreathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      .paw-container { animation: pawPress 4s infinite ease-out; transform-origin: center; }
      .anim-pad-main { animation: padBreathe 3s infinite ease-in-out; transform-origin: 64px 80px; }
      .anim-toe-1 { animation: padBreathe 3s infinite ease-in-out 0.2s; transform-origin: 32px 48px; }
      .anim-toe-2 { animation: padBreathe 3s infinite ease-in-out 0.4s; transform-origin: 52px 28px; }
      .anim-toe-3 { animation: padBreathe 3s infinite ease-in-out 0.6s; transform-origin: 76px 28px; }
      .anim-toe-4 { animation: padBreathe 3s infinite ease-in-out 0.8s; transform-origin: 96px 48px; }
    </style>
  </defs>

  <g class="paw-container">
    <!-- 外侧防护盾牌/底板 -->
    <path class="stroke-bold bg-fill" d="M 64 8 C 104 8, 120 32, 120 64 C 120 100, 84 120, 64 120 C 44 120, 8 100, 8 64 C 8 32, 24 8, 64 8 Z" />

    <!-- 掌心大肉垫 -->
    <g class="anim-pad-main">
      <path class="paw-pad-main" d="M 64 100 C 48 100 32 88 32 72 C 32 60 44 54 52 54 C 58 54 60 62 64 62 C 68 62 70 54 76 54 C 84 54 96 60 96 72 C 96 88 80 100 64 100 Z" />
    </g>

    <!-- 四个小脚趾垫 -->
    <g class="anim-toe-1">
      <ellipse cx="32" cy="48" rx="8" ry="12" class="paw-toe-1" transform="rotate(-30 32 48)" />
    </g>
    <g class="anim-toe-2">
      <ellipse cx="52" cy="28" rx="9" ry="14" class="paw-toe-2" transform="rotate(-10 52 28)" />
    </g>
    <g class="anim-toe-3">
      <ellipse cx="76" cy="28" rx="9" ry="14" class="paw-toe-3" transform="rotate(10 76 28)" />
    </g>
    <g class="anim-toe-4">
      <ellipse cx="96" cy="48" rx="8" ry="12" class="paw-toe-4" transform="rotate(30 96 48)" />
    </g>

    <!-- 流星点缀 (继承 currentColor) -->
    <g transform="translate(104, 24) rotate(45)" stroke="currentColor" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-8" x2="0" y2="8" />
      <line x1="-8" y1="0" x2="8" y2="0" />
      <circle cx="0" cy="0" r="1.5" class="bg-fill" stroke-width="2"/>
    </g>
  </g>
</svg>
