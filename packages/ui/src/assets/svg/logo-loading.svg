<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" class="meow-logo-loading">
  <defs>
    <style>
      /* 肉球颜色分离：使用 CSS 变量，若未提供则 fallback 到 currentColor */
      .paw-pad-main { fill: var(--logo-pad-color, currentColor); }
      .paw-toe-1 { fill: var(--logo-toe1-color, var(--logo-pad-color, currentColor)); }
      .paw-toe-2 { fill: var(--logo-toe2-color, var(--logo-pad-color, currentColor)); }
      .paw-toe-3 { fill: var(--logo-toe3-color, var(--logo-pad-color, currentColor)); }
      .paw-toe-4 { fill: var(--logo-toe4-color, var(--logo-pad-color, currentColor)); }

      /* 四个小脚趾垫依次闪烁跑马灯 */
      @keyframes toeLoading {
        0%, 100% { opacity: 0.2; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.1); }
      }

      /* 中心大肉垫心跳脉动 */
      @keyframes heartBeat {
        0% { transform: scale(1); }
        25% { transform: scale(1.15); }
        40% { transform: scale(1); }
        60% { transform: scale(1.15); }
        100% { transform: scale(1); }
      }

      .anim-toe-1 { animation: toeLoading 1.2s infinite ease-in-out 0s; transform-origin: 32px 48px; }
      .anim-toe-2 { animation: toeLoading 1.2s infinite ease-in-out 0.2s; transform-origin: 52px 28px; }
      .anim-toe-3 { animation: toeLoading 1.2s infinite ease-in-out 0.4s; transform-origin: 76px 28px; }
      .anim-toe-4 { animation: toeLoading 1.2s infinite ease-in-out 0.6s; transform-origin: 96px 48px; }
      
      .anim-pad-main {
        transform-origin: 64px 80px;
        animation: heartBeat 1.8s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
      }
    </style>
  </defs>

  <!-- 内部四个进度跳动的小图章豆豆 -->
  <g class="anim-toe-1">
    <ellipse cx="32" cy="48" rx="8" ry="12" class="paw-toe-1" transform="rotate(-30 32 48)" />
  </g>
  <g class="anim-toe-2">
    <ellipse cx="52" cy="28" rx="9" ry="14" class="paw-toe-2" transform="rotate(-10 52 28)" />
  </g>
  <g class="anim-toe-3">
    <ellipse cx="76" cy="28" rx="9" ry="14" class="paw-toe-3" transform="rotate(10 76 28)" />
  </g>
  <g class="anim-toe-4">
    <ellipse cx="96" cy="48" rx="8" ry="12" class="paw-toe-4" transform="rotate(30 96 48)" />
  </g>

  <!-- 主肉垫单独进行强烈的心跳动画 -->
  <g class="anim-pad-main">
    <path class="paw-pad-main" d="M 64 100 C 48 100 32 88 32 72 C 32 60 44 54 52 54 C 58 54 60 62 64 62 C 68 62 70 54 76 54 C 84 54 96 60 96 72 C 96 88 80 100 64 100 Z" />
  </g>
</svg>
