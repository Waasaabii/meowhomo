<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      .stroke-bold { fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-thin { fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .bg-fill { fill: var(--bg-color, #ffffff); }
      .accent-fill { fill: currentColor; }

      /* 头部大喊时的震动（Shouting vibrate） */
      @keyframes yellVibrate {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(-1px, 1px); }
        50% { transform: translate(1px, -1px); }
        75% { transform: translate(-1px, -1px); }
      }
      /* 喇叭声波扩散闪烁 */
      @keyframes soundWave {
        0% { transform: scale(0.8); opacity: 0; }
        50% { transform: scale(1); opacity: 1; }
        100% { transform: scale(1.2); opacity: 0; }
      }

      .anim-head { transform-origin: 24px 34px; animation: yellVibrate 0.1s infinite; }
      .anim-wave-1 { transform-origin: 8px 36px; animation: soundWave 1s ease-out infinite; }
      .anim-wave-2 { transform-origin: 8px 36px; animation: soundWave 1s ease-out infinite 0.3s; }
      .anim-wave-3 { transform-origin: 8px 36px; animation: soundWave 1s ease-out infinite 0.6s; }
    </style>
  </defs>

  <!-- 身体与双手 (双手举着大喇叭) -->
  <path class="stroke-bold bg-fill" d="M 16 48 C 16 40, 32 40, 32 48" />

  <!-- 扩音器/大声公 (Megaphone) -->
  <g transform="translate(14, 34) rotate(15)">
    <!-- 喇叭把手 -->
    <path class="stroke-bold" d="M 8 10 L 8 16" />
    <path class="stroke-bold" d="M 12 10 L 12 16" />
    <path class="stroke-bold bg-fill" d="M 8 16 C 8 18, 12 18, 12 16" />
    
    <!-- 喇叭锥筒体 -->
    <path class="stroke-bold bg-fill" d="M 16 4 C 18 2, 18 18, 16 16 L 4 13 L 4 7 Z" />
    <path class="stroke-bold bg-fill" d="M 8 6 L 8 14" stroke-opacity="0.3" /> <!-- 条纹 -->

    <!-- 抓喇叭的右爪 -->
    <ellipse cx="10" cy="12" rx="3" ry="4" class="stroke-bold bg-fill" />
  </g>

  <!-- 左爪托着喇叭尾部 -->
  <ellipse cx="28" cy="40" rx="4" ry="3" class="stroke-bold bg-fill" />

  <!-- 喇叭发出的声轨波动 (Sound waves) -->
  <g class="stroke-bold" fill="none">
    <path class="anim-wave-1" d="M 8 28 C 4 32, 4 40, 8 44" />
    <path class="anim-wave-2" d="M 4 25 C -2 31, -2 41, 4 47" />
    <path class="anim-wave-3" d="M 0 22 C -8 30, -8 42, 0 50" />
  </g>

  <!-- 头部主容器 (疯狂张大嘴巴吼叫) -->
  <g class="anim-head">
    <!-- 包子脸框 -->
    <path class="stroke-bold bg-fill" d="M 24 38 C 38 38, 40 26, 40 18 C 40 10, 34 6, 24 6 C 14 6, 8 10, 8 18 C 8 26, 10 38, 24 38 Z" />

    <!-- 激动竖立的猫耳 -->
    <path class="stroke-bold bg-fill" d="M 16 14 L 10 2 L 22 10" />
    <path class="stroke-bold bg-fill" d="M 32 14 L 38 2 L 26 10" />

    <!-- 紧闭用力皱起的八字眉 (Yelling brows `\ /`) -->
    <path class="stroke-bold" d="M 14 18 L 22 24" />
    <path class="stroke-bold" d="M 34 18 L 26 24" />

    <!-- 用力紧闭双眼 (`> <`) -->
    <path class="stroke-bold" d="M 12 28 C 14 26, 18 26, 20 28" />
    <path class="stroke-bold" d="M 36 28 C 34 26, 30 26, 28 28" />
    
    <!-- 极度夸张张开的巨嘴（里面有小虎牙） -->
    <path class="stroke-bold bg-fill" d="M 24 32 C 18 32, 16 40, 24 40 C 32 40, 30 32, 24 32 Z" />
    <path class="stroke-thin" d="M 21 33 L 23 36 L 24 33 M 27 33 L 25 36 L 24 33" /> <!-- 上排尖牙 -->
  </g>
</svg>
