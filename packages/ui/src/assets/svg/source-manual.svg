<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" class="nav-icon">
  <defs>
    <style>
      .stroke-main { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .fill-main { fill: currentColor; }
      
      /* 得意洋洋叼着鱼左右摇摆地走来（Waddle walk） */
      @keyframes walkWaddle {
        0%, 100% { transform: rotate(0deg) translateY(0); }
        25% { transform: rotate(-5deg) translateY(-1px); }
        75% { transform: rotate(5deg) translateY(-1px); }
      }
      .nav-icon:hover .anim-body { transform-origin: 12px 20px; animation: walkWaddle 0.6s ease-in-out infinite; }
    </style>
  </defs>
  
  <g class="anim-body">
    <!-- 脑袋轮廓 -->
    <path class="stroke-main" fill="var(--bg-color, #ffffff)" d="M 6 16 C 6 10 8 6 12 6 C 16 6 18 10 18 16" />
    <!-- 猫耳 -->
    <path class="stroke-main" d="M 6 10 L 4 4 L 10 6" />
    <path class="stroke-main" d="M 18 10 L 20 4 L 14 6" />
    
    <!-- 得意闭着的开心眼 `^ ^` -->
    <path class="stroke-main" d="M 8 12 Q 10 10 11 12" />
    <path class="stroke-main" d="M 16 12 Q 14 10 13 12" />
    
    <!-- 嘴巴里叼着横向的一条大黑鱼 (Manual Import fish) -->
    <path class="stroke-main" fill="var(--bg-color, #ffffff)" d="M 7 15 C 7 15 11 13 14 15 C 17 17 17 17 17 17" />
    <path class="stroke-main" d="M 17 17 L 19 15 M 17 17 L 19 19" />
    <!-- 俏皮猫鼻压在鱼上面 -->
    <circle cx="12" cy="16" r="1.5" class="fill-main" />
  </g>
</svg>
